name: build-auron
description: 'Build Auron and cache the jar by checked-out commit'
inputs:
  java-version:
    description: 'jdk version to build with'
    required: false
    default: '8'
  spark-binary-version:
    description: 'spark binary version (e.g. 3.5)'
    required: false
    default: '3.5'
  scala-binary-version:
    description: 'scala binary version (e.g. 2.12)'
    required: false
    default: '2.12'
  repository:
    description: 'repository of auron to build'
    required: false
    default: 'apache/auron'
  ref:
    description: 'branch/commit of auron to build'
    required: false
    default: 'master'
outputs:
  cache-key:
    description: 'Cache key of the built auron jar'
    value: ${{ steps.cache-key.outputs.key }}
  jar-path:
    description: 'Glob path of the built auron jar'
    value: auron-spark-${{ inputs.spark-binary-version }}*.jar
runs:
  using: composite
  steps:
    - name: Checkout Auron
      uses: actions/checkout@v5
      with:
        repository: ${{ inputs.repository }}
        path: auron
        ref: ${{ inputs.ref }}
        fetch-depth: 1
    - name: Resolve commit and cache key
      id: cache-key
      shell: bash
      run: |
        commit=$(git -C auron rev-parse HEAD)
        echo "commit=$commit" >> $GITHUB_OUTPUT
        echo "key=auron-spark${{ inputs.spark-binary-version }}-$commit" >> $GITHUB_OUTPUT
    - name: Get cached Auron lib
      id: get-auron-spark-cache
      uses: actions/cache/restore@v5
      with:
        path: auron-spark-${{ inputs.spark-binary-version }}*.jar
        key: ${{ steps.cache-key.outputs.key }}
    - name: Setup Rust & Java toolchain
      if: steps.get-auron-spark-cache.outputs.cache-hit != 'true'
      uses: ./.github/actions/setup-builder
      with:
        rust-version: 'stable'
        jdk-version: ${{ inputs.java-version }}
    - name: Setup Maven
      if: steps.get-auron-spark-cache.outputs.cache-hit != 'true'
      uses: ./.github/actions/setup-maven
    - name: Build Auron
      if: steps.get-auron-spark-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        cd auron
        export RUSTFLAGS="-C target-cpu=x86-64"
        ./auron-build.sh \
          --release \
          --sparkver ${{ inputs.spark-binary-version }} \
          --scalaver ${{ inputs.scala-binary-version }} \
          --clean true \
          --skiptests true
        cp target/auron-spark-${{ inputs.spark-binary-version }}*.jar ..
    - name: Cached Auron lib
      if: steps.get-auron-spark-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: auron-spark-${{ inputs.spark-binary-version }}*.jar
        key: ${{ steps.cache-key.outputs.key }}
